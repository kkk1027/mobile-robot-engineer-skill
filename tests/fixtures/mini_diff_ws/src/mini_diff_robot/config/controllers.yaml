controller_manager:
  ros__parameters:
    update_rate: 50
    diff_base_controller:
      type: diff_drive_controller/DiffDriveController

diff_base_controller:
  ros__parameters:
    left_wheel_names: [left_wheel_joint]
    right_wheel_names: [right_wheel_joint]
    wheel_separation: 0.34
    wheel_radius: 0.08
    publish_rate: 30.0
    cmd_vel_timeout: 0.25
    use_stamped_vel: true
    enable_odom_tf: true
